# 1. MONGODB SERVICE
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  ports:
    - port: 27017
  selector:
    app: mongodb
---
# 2. MONGODB DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
---
# 3. NESTJS APP DEPLOYMENT (Optimized for HPA)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-app
spec:
  replicas: 2 # Start small so you can watch it grow
  selector:
    matchLabels:
      app: nest-app
  template:
    metadata:
      labels:
        app: nest-app
    spec:
      containers:
      - name: nest-app
        image: nest-perf-app:v1 # Ensure this matches your 'docker build' tag
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/perf_db"
        resources:
          requests:
            cpu: "500m"      # 10% of a core. HPA uses this as the "100%" baseline.
            memory: "512Mi"
          limits:
            cpu: "1000m"      # Prevents one pod from freezing your Windows CPU
            memory: "1Gi"
---
# 4. NESTJS SERVICE (Load Balancer)
apiVersion: v1
kind: Service
metadata:
  name: nest-service
spec:
  type: LoadBalancer
  selector:
    app: nest-app
  ports:
    - protocol: TCP
      port: 8080      # You hit http://localhost:8080
      targetPort: 3000
---
# 5. HORIZONTAL POD AUTOSCALER (The "Auto-Scaler")
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nest-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nest-app
  minReplicas: 2
  maxReplicas: 6     # Max pods allowed on your laptop
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # Scale up if average CPU usage > 50%
