apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  ports:
    - port: 27017
  selector:
    app: mongodb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-app
spec:
  replicas: 3  # Start with 3 instances of your app
  selector:
    matchLabels:
      app: nest-app
  template:
    metadata:
      labels:
        app: nest-app
    spec:
      containers:
      - name: nest-app
        image: nest-perf-app:v1
        resources:
          requests:
            cpu: "500m"      # 0.5 CPU core (Forces spreading)
            memory: "512Mi"  # 512MB RAM
          limits:
            cpu: "1000m"     # 1 full CPU core max
            memory: "1Gi"    # 1GB RAM max
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/perf_db"
---
apiVersion: v1
kind: Service
metadata:
  name: nest-service
spec:
  type: LoadBalancer
  selector:
    app: nest-app
  ports:
    - protocol: TCP
      port: 8080      # You will hit http://localhost:8080
      targetPort: 3000
